<!doctype html>
<html>
	<head>
		<title>p5 sketches</title>
		<script src="https://cdn.jsdelivr.net/npm/p5@1.9.0/lib/p5.min.js"></script>
		<link rel="stylesheet" href="index.css" />
	</head>
	<body>
		<div>
			<label
				>curves:
				<input type="range" id="curves" min="2" max="24" value="6"
			/></label>
			<label
				>speed:
				<input
					type="range"
					id="speed"
					min="0.001"
					max="0.1"
					value="0.02"
					step="0.001"
			/></label>
			<label
				>scale:
				<input
					type="range"
					id="scale"
					min="50"
					max="300"
					value="100"
					step="10"
			/></label>
			<label
				>weight:
				<input
					type="range"
					id="weight"
					min="0.5"
					max="10"
					value="2"
					step="0.5"
			/></label>
			<label
				>pulse speed:
				<input
					type="range"
					id="pulseSpeed"
					min="0.01"
					max="0.2"
					value="0.05"
					step="0.01"
			/></label>
			<label
				>pulse max:
				<input
					type="range"
					id="pulseMax"
					min="50"
					max="300"
					value="150"
					step="10"
			/></label>
		</div>
		<script src="sketch.js"></script>
	</body>
</html>
